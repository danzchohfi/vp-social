name: CI

# Runs on every pull request (any branch) and on push to main so the
# main branch stays continuously green. Three checks gate merges:
#   1. TypeScript — `tsc --noEmit` against the whole webapp
#   2. Vitest — unit tests for lib/*.test.ts
#   3. Build — `next build` so deploy-time crashes surface in PR
#
# We deliberately skip `next lint` because Next 16 deprecated it and
# pulling in the migration tool would require an interactive prompt.
# Type-check + tests + build catch real bugs; lint is style noise.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package.json

      - name: Install dependencies
        working-directory: webapp
        run: |
          for i in 1 2 3; do
            npm install --legacy-peer-deps \
              --fetch-retries=5 \
              --fetch-retry-mintimeout=20000 \
              --fetch-retry-maxtimeout=120000 \
              --prefer-online && exit 0
            echo "npm install attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Type-check
        working-directory: webapp
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: webapp
        run: npm test

      - name: Build
        working-directory: webapp
        # Skip the prebuild icon-generation step (only needed for runtime
        # serving), and skip db:migrate (CI has no DATABASE_URL access).
        # `npx next build` calls Next directly; Vercel still runs the full
        # `npm run build` with db:migrate prepended on deploy.
        run: npx next build
        env:
          # Better-Auth + Drizzle init lazily; placeholder values keep
          # the build's data-collection step from crashing on missing env.
          BETTER_AUTH_SECRET: ci-placeholder-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://placeholder@localhost:5432/placeholder
          FACEBOOK_APP_ID: ci
          FACEBOOK_APP_SECRET: ci
          NOTION_CLIENT_ID: ci
          NOTION_CLIENT_SECRET: ci
          TRIGGER_PROJECT_ID: ci
          TRIGGER_SECRET_KEY: ci
